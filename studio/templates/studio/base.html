{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Railly Studio{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'studio/css/style.css' %}">
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <a class="logo" href="{% url 'studio:home' %}">Railly Studio</a>
      <nav class="nav">
        <a href="{% url 'studio:home' %}">Главная</a>
        <a href="{% url 'studio:game_list' %}">Игры</a>
      </nav>
    </div>
  </header>

  <main class="main">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>© {% now "Y" %} Railly Studio. Игровая студия.</p>
    </div>
  </footer>
</body>
</html>
